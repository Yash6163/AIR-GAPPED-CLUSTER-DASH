version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clusterdash-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clusterdash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clusterdash-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clusterdash-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=clusterdash-db
      - REDIS_HOST=clusterdash-redis
      - SECRET_KEY=super-secret-clusterdash-key-change-in-production
      - WORKER_REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - ALERT_CPU_THRESHOLD_PCT=85.0
      - ALERT_MEM_THRESHOLD_PCT=90.0
      - ALERT_DISK_THRESHOLD_PCT=90.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clusterdash-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Virtual Node 1 (Simulated Swarm Manager Node)
  node-1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: node-1
    hostname: node-1
    environment:
      - BACKEND_URL=http://clusterdash-backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    depends_on:
      - backend

  # Virtual Node 2 (Simulated Worker Node on Laptop A)
  node-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: node-2
    hostname: node-2
    environment:
      - BACKEND_URL=http://clusterdash-backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    depends_on:
      - backend

  # Virtual Node 3 (Simulated Worker Node on Laptop A)
  node-3:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: node-3
    hostname: node-3
    environment:
      - BACKEND_URL=http://clusterdash-backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data:
