version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clusterdash-db-sim
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clusterdash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_sim:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clusterdash-redis-sim
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clusterdash-backend-sim
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - SECRET_KEY=super-secret-clusterdash-key-change-in-production
      - WORKER_REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - ALERT_CPU_THRESHOLD_PCT=85.0
      - ALERT_MEM_THRESHOLD_PCT=90.0
      - ALERT_DISK_THRESHOLD_PCT=90.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clusterdash-frontend-sim
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  # Simulated MacOS Swarm Manager
  worker-mac-1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: clusterdash-mac-manager-sim
    hostname: mac-manager
    environment:
      - BACKEND_URL=http://backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=manager
      - OVERRIDE_OS=darwin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

  # Simulated MacOS Worker Node
  worker-mac-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: clusterdash-mac-worker-1-sim
    hostname: mac-worker-1
    environment:
      - BACKEND_URL=http://backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=worker
      - OVERRIDE_OS=darwin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

  # Simulated Windows Worker Node 1
  worker-win-1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: clusterdash-win-worker-1-sim
    hostname: win-worker-1
    environment:
      - BACKEND_URL=http://backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=worker
      - OVERRIDE_OS=windows
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

  # Simulated Windows Worker Node 2
  worker-win-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: clusterdash-win-worker-2-sim
    hostname: win-worker-2
    environment:
      - BACKEND_URL=http://backend:8000
      - REGISTRATION_TOKEN=clusterdash-worker-secret-token
      - HEARTBEAT_INTERVAL=5
      - NODE_ROLE=worker
      - OVERRIDE_OS=windows
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

volumes:
  postgres_data_sim:
